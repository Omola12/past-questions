<!DOCTYPE html>
<html>
<head>
    <title>Exam Admin - Manage Subjects & Questions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #1a1a2e; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: #16213e; color: white; padding: 25px; border-radius: 10px; text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card h2 { color: #16213e; margin-bottom: 20px; border-bottom: 3px solid #e94560; display: inline-block; padding-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #e94560; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; font-size: 14px; }
        button:hover { opacity: 0.9; }
        .subject-list { max-height: 400px; overflow-y: auto; }
        .subject-item { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #e94560; cursor: pointer; }
        .subject-item:hover { background: #e9ecef; }
        .subject-name { font-weight: bold; font-size: 18px; }
        .question-count { color: #666; font-size: 12px; margin-top: 5px; }
        .delete-subject { float: right; background: #dc3545; padding: 5px 10px; font-size: 12px; }
        .question-item { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .correct-badge { background: #28a745; color: white; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
        .tab { overflow: hidden; margin-bottom: 20px; }
        .tab button { background: #ddd; float: left; border: none; outline: none; cursor: pointer; padding: 10px 20px; transition: 0.3s; margin: 0; }
        .tab button.active { background: #e94560; color: white; }
        .tabcontent { display: none; }
        .success { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .exam-link { background: #0f3460; color: white; padding: 15px; margin-top: 20px; border-radius: 8px; text-align: center; }
        .exam-link a { color: #ffd700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Exam Management System</h1>
            <p>Create subjects, add questions, set correct answers</p>
        </div>

        <div class="grid">
            <!-- Left Panel: Subjects -->
            <div class="card">
                <h2>📂 Subjects</h2>
                <input type="text" id="newSubjectName" placeholder="Subject name (e.g., JavaScript)">
                <input type="number" id="passingScore" placeholder="Passing score % (e.g., 70)" value="70">
                <button onclick="addSubject()">➕ Add Subject</button>
                
                <div class="subject-list" id="subjectsList"></div>
            </div>

            <!-- Right Panel: Questions for selected subject -->
            <div class="card">
                <h2>❓ Questions for: <span id="selectedSubjectName">(Select a subject)</span></h2>
                <div id="questionPanel">
                    <p style="color: #999; text-align: center; padding: 40px;">Select a subject from the left to add questions</p>
                </div>
            </div>
        </div>

        <div class="exam-link" id="examLink" style="display: none;">
            <strong>🔗 Share this exam link with students:</strong><br>
            <a href="#" id="studentLink" target="_blank">Click to open student exam</a>
        </div>
    </div>

    <script>
        let subjects = JSON.parse(localStorage.getItem('examSubjects')) || [];
        let currentSubjectId = null;

        function saveSubjects() {
            localStorage.setItem('examSubjects', JSON.stringify(subjects));
        }

        function displaySubjects() {
            const container = document.getElementById('subjectsList');
            if (subjects.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">No subjects yet. Create one above!</p>';
                return;
            }

            container.innerHTML = '';
            subjects.forEach((subject, index) => {
                const questionCount = subject.questions ? subject.questions.length : 0;
                container.innerHTML += `
                    <div class="subject-item" onclick="selectSubject(${subject.id})">
                        <button class="delete-subject" onclick="event.stopPropagation(); deleteSubject(${subject.id})">Delete</button>
                        <div class="subject-name">${subject.name}</div>
                        <div class="question-count">📝 ${questionCount} questions | Pass: ${subject.passingScore}%</div>
                    </div>
                `;
            });
        }

        function addSubject() {
            const name = document.getElementById('newSubjectName').value.trim();
            const passingScore = document.getElementById('passingScore').value;
            
            if (!name) {
                alert('Please enter a subject name');
                return;
            }

            const newId = Date.now();
            subjects.push({
                id: newId,
                name: name,
                passingScore: parseInt(passingScore),
                questions: []
            });

            saveSubjects();
            displaySubjects();
            document.getElementById('newSubjectName').value = '';
            
            // Auto-select new subject
            selectSubject(newId);
        }

        function deleteSubject(id) {
            if (confirm('Delete this subject and ALL its questions?')) {
                subjects = subjects.filter(s => s.id !== id);
                saveSubjects();
                displaySubjects();
                if (currentSubjectId === id) {
                    currentSubjectId = null;
                    document.getElementById('selectedSubjectName').innerText = '(Select a subject)';
                    document.getElementById('questionPanel').innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">Select a subject from the left to add questions</p>';
                    document.getElementById('examLink').style.display = 'none';
                }
            }
        }

        function selectSubject(id) {
            currentSubjectId = id;
            const subject = subjects.find(s => s.id === id);
            if (!subject) return;

            document.getElementById('selectedSubjectName').innerText = subject.name;
            displayQuestions(subject);
            
            // Show exam link
            document.getElementById('examLink').style.display = 'block';
            document.getElementById('studentLink').href = `student-exam.html?subject=${subject.id}`;
            document.getElementById('studentLink').innerText = `Take ${subject.name} Exam`;
        }

        function displayQuestions(subject) {
            const container = document.getElementById('questionPanel');
            
            container.innerHTML = `
                <div style="margin-bottom: 20px; padding: 15px; background: #f0f8ff; border-radius: 8px;">
                    <h3>➕ Add New Question</h3>
                    <textarea id="qText" rows="2" placeholder="Question text" style="width: 100%;"></textarea>
                    <input type="text" id="optA" placeholder="Option A">
                    <input type="text" id="optB" placeholder="Option B">
                    <input type="text" id="optC" placeholder="Option C">
                    <input type="text" id="optD" placeholder="Option D">
                    <select id="correctOpt">
                        <option value="A">Correct: Option A</option>
                        <option value="B">Correct: Option B</option>
                        <option value="C">Correct: Option C</option>
                        <option value="D">Correct: Option D</option>
                    </select>
                    <button onclick="addQuestion(${subject.id})">➕ Add Question</button>
                </div>
                
                <h3>📋 Existing Questions (${subject.questions.length})</h3>
                <div id="questionsList"></div>
            `;
            
            displayQuestionsList(subject);
        }

        function displayQuestionsList(subject) {
            const container = document.getElementById('questionsList');
            if (!subject.questions || subject.questions.length === 0) {
                container.innerHTML = '<p style="color: #999;">No questions yet. Add your first question above!</p>';
                return;
            }

            container.innerHTML = '';
            subject.questions.forEach((q, idx) => {
                container.innerHTML += `
                    <div class="question-item">
                        <button onclick="deleteQuestion(${subject.id}, ${idx})" style="float: right; background: #dc3545; padding: 5px 10px;">Delete</button>
                        <strong>Q${idx + 1}:</strong> ${q.text}<br>
                        <strong>A:</strong> ${q.A}<br>
                        <strong>B:</strong> ${q.B}<br>
                        <strong>C:</strong> ${q.C}<br>
                        <strong>D:</strong> ${q.D}<br>
                        <span class="correct-badge">✓ Correct Answer: ${q.correct}</span>
                    </div>
                `;
            });
        }

        function addQuestion(subjectId) {
            const text = document.getElementById('qText').value.trim();
            const A = document.getElementById('optA').value.trim();
            const B = document.getElementById('optB').value.trim();
            const C = document.getElementById('optC').value.trim();
            const D = document.getElementById('optD').value.trim();
            const correct = document.getElementById('correctOpt').value;

            if (!text || !A || !B || !C || !D) {
                alert('Please fill in question text and all 4 options');
                return;
            }

            const subject = subjects.find(s => s.id === subjectId);
            if (!subject) return;

            if (!subject.questions) subject.questions = [];
            subject.questions.push({ text, A, B, C, D, correct });

            saveSubjects();
            
            // Clear form
            document.getElementById('qText').value = '';
            document.getElementById('optA').value = '';
            document.getElementById('optB').value = '';
            document.getElementById('optC').value = '';
            document.getElementById('optD').value = '';
            
            displayQuestions(subject);
        }

        function deleteQuestion(subjectId, questionIndex) {
            if (confirm('Delete this question?')) {
                const subject = subjects.find(s => s.id === subjectId);
                subject.questions.splice(questionIndex, 1);
                saveSubjects();
                displayQuestions(subject);
            }
        }

        // Initial load
        displaySubjects();
    </script>
</body>
</html>
